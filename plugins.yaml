## ~/.config/k9s/plugins.yml
plugins:
  roll:
    shortCut: Shift-E
    confirm: false
    description: rollout
    scopes:
    - deploy
    command: sh
    background: false
    args:
    - -c
    - "~/.config/k9s/scripts/rollout-deploy.sh $NAME $NAMESPACE $CONTEXT"
  debug:
    shortCut: Shift-D
    description: debug
    scopes:
      - containers
    command: bash
    background: false
    confirm: true
    args:
      - -c
      - "kubectl debug -it -n=$NAMESPACE $POD --target=$NAME --image=easzlab.io.local:5000/netshoot:latest  --share-processes -- bash"
  dive:
    shortCut: d
    confirm: false
    description: "Dive"
    scopes:
      - containers
    command: dive
    background: false
    args:
      - $COL-IMAGE

  updown:
    shortCut: Shift-U
    confirm: false
    description: updownf
    scopes:
    - containers
    command: sh
    background: false
    args:
    - -c
    - "~/.config/k9s/scripts/file-up-down.sh  $POD  $NAMESPACE $NAME $CONTEXT"

  gyaml:
    shortCut: Shift-Y
    confirm: false
    description: gyaml
    scopes:
    - all
    command: sh
    background: false
    args:
    - -c
    - "~/.config/k9s/scripts/get-yaml.sh  $RESOURCE_NAME  $NAME  $NAMESPACE $CONTEXT"
  slogs:
    shortCut: Shift-L
    confirm: false
    description: slogs
    scopes:
    - containers
    command: sh
    background: false
    args:
    - -c
    - "~/.config/k9s/scripts/logtail.sh $NAMESPACE $POD $NAME $CONTEXT"
  pexec:
    shortCut: Shift-K
    confirm: false
    description: pexec
    scopes:
    - deploy
    - daemonset
    - statefulset
    - namespaces
    command: sh
    background: false
    args:
    - -c
    - "~/.config/k9s/scripts/pexec.sh $NAMESPACE $RESOURCE_NAME $CONTEXT $NAME"
  modsecret:
    shortCut: Shift-M
    confirm: false
    description: modsecret
    scopes:
    - secrets
    command: sh
    background: false
    args:
    - -c
    - "~/.config/k9s/scripts/modify-secret.sh $NAMESPACE $RESOURCE_NAME $CONTEXT $NAME"
  duplipod:
    shortCut: Shift-C
    description: dupliPod
    scopes:
      - po
      - deploy
    command: sh
    background: false
    args:
    - -c
    - "~/.config/k9s/scripts/duplicate-pod.sh $NAMESPACE $RESOURCE_NAME $CONTEXT $NAME"
  blame:
    shortCut: Ctrl-B
    confirm: false
    description: "Blame"
    scopes:
      - all
    command: sh
    background: false
    args:
    - -c
    - "~/.config/k9s/scripts/blame.sh $RESOURCE_NAME $NAME $NAMESPACE $CONTEXT"
    #- "~/.config/k9s/scripts/test.sh $RESOURCE_NAME $NAME $NAMESPACE $CONTEXT"
  gdepen:
    shortCut: Ctrl-V
    confirm: false
    description: "gdepen"
    scopes:
      - all
    command: sh
    background: false
    args:
    - -c
    - "~/.config/k9s/scripts/get-depen.sh $NAMESPACE $RESOURCE_NAME $CONTEXT $NAME"
  Sdeploy:
    shortCut: Ctrl-P
    confirm: false
    description: "Sdeploy"
    scopes:
      - namespaces
    command: sh
    background: false
    args:
    - -c
    - "~/.config/k9s/scripts/resources-deploy.sh $NAME  $CONTEXT"
  Midcli:
    shortCut: Ctrl-K
    confirm: false
    description: "Midcli"
    scopes:
      - namespaces
    command: sh
    background: false
    args:
    - -c
    - "~/.config/k9s/scripts/middleware-cli.sh $NAME  $CONTEXT"
  kor:
    shortCut: Ctrl-U
    confirm: false
    description: "Unreso"
    scopes:
      - all
    command: sh
    background: false
    args:
    - -c
    - "~/.config/k9s/scripts/kor.sh $NAMESPACE  $RESOURCE_NAME $CONTEXT $NAME"
  kprompt:
    #wget https://github.com/c-bata/kube-prompt/releases/download/v1.0.11/kube-prompt_v1.0.11_linux_amd64.zip
    #unzip kube-prompt_v1.0.11_linux_amd64.zip
    #chmod +x kube-prompt
    #sudo mv ./kube-prompt /usr/local/bin/kube-prompt
    shortCut: Ctrl-T
    confirm: false
    description: "kprompt"
    scopes:
      - all
    command: sh
    background: false
    args:
    - -c
    - "clear && ~/.config/k9s/bin/kube-prompt"
  gonzo:
    shortCut: Ctrl-L
    description: "Gonzo log analysis"
    scopes:
      - po # 针对 Pod 作用域
    command: sh
    background: false
    args:
      - -c
      - "kubectl logs --tail=100 -f $NAME -n $NAMESPACE --context $CONTEXT | ~/.config/k9s/bin/gonzo"